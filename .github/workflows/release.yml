name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      - name: Build linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -o storctl-linux-arm64 ./cmd/storctl
          sha256sum storctl-linux-arm64 > storctl-linux-arm64.sha256
          zip -9 storctl-linux-arm64.zip storctl-linux-arm64 README.md storctl-linux-arm64.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            storctl-linux-arm64.zip \
            storctl-linux-arm64.sha256 \
            --title "storctl ${GITHUB_REF_NAME}" \
            --notes "Initial storctl CLI with NetworkManager, CX7/1823 QoS, DOCA-OFED, and NFS-RDMA mount support."

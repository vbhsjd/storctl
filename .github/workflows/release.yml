name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: |
          go test ./...
          go vet ./...

      - name: Build native smoke binary
        run: |
          go build -ldflags "-X storctl/internal/storctl.Version=${GITHUB_REF_NAME} -X storctl/internal/storctl.Commit=${GITHUB_SHA} -X storctl/internal/storctl.BuiltAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o storctl-smoke ./cmd/storctl
          ./storctl-smoke version --json | grep "${GITHUB_REF_NAME}"
          ./storctl-smoke check --json >/tmp/storctl-check.json
          ./storctl-smoke facts --json >/tmp/storctl-facts.json

      - name: Build linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags "-X storctl/internal/storctl.Version=${GITHUB_REF_NAME} -X storctl/internal/storctl.Commit=${GITHUB_SHA} -X storctl/internal/storctl.BuiltAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o storctl-linux-arm64 ./cmd/storctl
          sha256sum storctl-linux-arm64 > storctl-linux-arm64.sha256
          zip -9 storctl-linux-arm64.zip \
            storctl-linux-arm64 \
            storctl-linux-arm64.sha256 \
            README.md \
            README.en.md \
            CHANGELOG.md \
            LICENSE \
            storctl-profiles.example.json \
            storctl-artifacts.example.json \
            docs/tutorial.md \
            docs/offline-driver-matrix.md
          unzip -l storctl-linux-arm64.zip | grep README.en.md
          unzip -l storctl-linux-arm64.zip | grep docs/tutorial.md
          unzip -l storctl-linux-arm64.zip | grep docs/offline-driver-matrix.md

      - name: Release notes
        run: |
          awk "/^## ${GITHUB_REF_NAME}/{flag=1;next}/^## v/{flag=0}flag" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "storctl ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            storctl-linux-arm64.zip \
            storctl-linux-arm64.sha256 \
            --title "storctl ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
